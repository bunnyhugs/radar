<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="utf-8">
  <title>Carvel Radar</title>
  <meta name="description" content="Carvel Radar">
  <meta name="author" content="CCMEP">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <link rel="stylesheet" href="bootstrap.min.css" />
  <link rel="stylesheet" href="all.min.css" />
  <link rel="stylesheet" href="ol.css" type="text/css"/>
  <script src="ol.js"></script>
</head>

<body>
  <div id="map">
<div id="radarInset">
  <img src="./overlay.png" class="overlay">
  <img src="./overlay.png" class="radar" id="radar">
  <img src="./overlay.png" class="radar radarbackup" id="radarbackup1">
  <img src="./overlay.png" class="radar radarbackup" id="radarbackup2">
</div>
  <div id="controller" role="group" aria-label="Animation controls">
    <button id="fast-backward" class="btn btn-primary btn-sm" type="button"><i class="fa fa-fast-backward"></i></button>
    <button id="step-backward" class="btn btn-primary btn-sm" type="button"><i class="fa fa-step-backward"></i></button>
    <button id="play-pause" class="btn btn-primary btn-sm" type="button"><i class="fa fa-play"></i></button>
    <button id="step-forward" class="btn btn-primary btn-sm" type="button"><i class="fa fa-step-forward"></i></button>
    <button id="fast-forward" class="btn btn-primary btn-sm" type="button"><i class="fa fa-fast-forward"></i></button>
    <button id="radarBtn" class="btn btn-primary btn-sm speedbtn" type="button"><i class="fas fa-satellite-dish"></i></button>
    <button id="legendBtn" class="btn btn-primary btn-sm speedbtn" type="button"><i class="fa fa-question"></i></button>
	<br />
    <div id="info" class="txt"></div>
    <button id="speed-down" class="btn btn-primary btn-sm speedbtn" type="button"><i class="fas fa-minus"></i></button>
	<div id="speed" class="txt"></div>
    <button id="speed-up" class="btn btn-primary btn-sm speedbtn" type="button"><i class="fa fa-plus"></i></button>
    <button id="timespan" class="btn btn-primary btn-sm speedbtn" type="button"><i class="fas fa-hourglass-half"></i></button>
  </div>
</div>
<div id="legendPopup">
  <img src="./geometLegend.png" alt="Legend Image" id="legendImage">
</div>
  <script src="./radarMap.js"></script>
</body>
</html>
