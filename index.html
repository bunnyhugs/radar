<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    #map {
      width: 100%;
      height: 100%;
    }
	#controller {
	  background: rgba(255,255,255,0);
	  padding: 0.5rem;
	  float: left;
	  position: absolute;
	  bottom: 20px;
	  left: 50%;
	  transform: translateX(-50%);
	  z-index: 100;
	  text-align: center;
	}
	i.fa {
	  padding: 0rem 1rem;
	}
	.speedbtn i {
	  padding: 0rem 0rem;
	}

    div.txt {
      overflow-x: clip;
	  text-wrap: nowrap;
	  background: rgba(255,255,255,0.5);
	  border-radius: 10px;
	  display: inline-block;
    }

	#speed {
	  padding: 0 0.5rem;
	  width: 3rem;
	}
	
	#info {
	  padding: 0 1rem;
	  width: 14rem;
	}
	
	
  </style>
  <title>GeoMet Animated WMS Time OpenLayers Example</title>
  <meta name="description" content="GeoMet OpenLayers Example">
  <meta name="author" content="CCMEP">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" integrity="sha384-wvfXpqpZZVQGK6TAh5PVlGOfQNHSoD2xbE+QkPxCAFlNEevoEH3Sl0sibVcOQVnN" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.3.0/ol.css" type="text/css"/>
  <script src="https://cdn.jsdelivr.net/npm/ol@v7.3.0/dist/ol.js"></script>
</head>

<body>
  <div id="map">
  <div id="controller" role="group" aria-label="Animation controls">
    <button id="fast-backward" class="btn btn-primary btn-sm" type="button"><i class="fa fa-fast-backward"></i></button>
    <button id="step-backward" class="btn btn-primary btn-sm" type="button"><i class="fa fa-step-backward"></i></button>
    <button id="play-pause" class="btn btn-primary btn-sm" type="button"><i class="fa fa-play"></i></button>
    <button id="step-forward" class="btn btn-primary btn-sm" type="button"><i class="fa fa-step-forward"></i></button>
    <button id="fast-forward" class="btn btn-primary btn-sm" type="button"><i class="fa fa-fast-forward"></i></button>
	<br />
    <div id="info" class="txt"></div>
    <button id="speed-down" class="btn btn-primary btn-sm speedbtn" type="button"><i class="fa fa-minus"></i></button>
	<div id="speed" class="txt"></div>
    <button id="speed-up" class="btn btn-primary btn-sm speedbtn" type="button"><i class="fa fa-plus"></i></button>
    <button id="timespan" class="btn btn-primary btn-sm speedbtn" type="button"><i class="fa fa-hourglass-half"></i></button>
  </div>
</div>
  <script src="./tutorial.js"></script>
</body>
</html>
